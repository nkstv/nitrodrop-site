<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#171209">
<title>Drop Cash — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#171209; --bg-soft:#1d1710; --panel:#221a10; --panel-2:#2a2115; --panel-3:#332818;
    --line:rgba(232,193,104,.10); --gold:#E8C168; --gold-deep:#C79A3C;
    --cream:#F2E9D8; --muted:#9a8b6d; --muted-2:#6f6350;
    --red:#F26D6D; --green:#5FD68B;
    --r-l:20px; --r-m:14px;
    --gap:14px; --chrome:300px; --side:238px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    background:radial-gradient(1000px 500px at 70% -10%, rgba(232,193,104,.055), transparent 60%), var(--bg);
    color:var(--cream); font-family:"Nunito Sans",system-ui,sans-serif;
    /* Filet de sécurité : aucun élément ne doit pouvoir créer de défilement
       horizontal sur mobile. */
    overflow-x:hidden; max-width:100%;
  }
  h1{font-family:"Baloo 2",sans-serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  /* Empêche le zoom au double-tap sur mobile quand on appuie vite plusieurs fois
     (Max, ½, 2×, cases du plateau...). Le zoom au pincement reste possible. */
  button, a, input, select, label, .tile, .chip, .d-item, .offer-copy-btn, .mult{
    touch-action:manipulation;
  }
  /* Évite le surlignage bleu et le menu contextuel quand on tape vite sur un
     bouton. Le texte des pages reste sélectionnable normalement. */
  button, .tile, .chip, .mult, .bet-btn, .d-item{
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  /* iOS zoome automatiquement sur un champ dont la police fait moins de 16px.
     On force 16px sur mobile uniquement : l'apparence sur ordinateur ne change pas. */
  @media(max-width:860px){
    input, select, textarea{font-size:16px !important;}
  }
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}

  .app{display:grid;grid-template-columns:var(--side) 1fr;min-height:100vh}

  /* ================= SIDEBAR ================= */
  .side{
    position:sticky;top:0;height:100vh;display:flex;flex-direction:column;
    background:linear-gradient(180deg,var(--panel-2),var(--panel) 60%,var(--bg-soft));
    border-right:1px solid var(--line);padding:16px 12px;gap:14px;overflow-y:auto;
  }
  .side::-webkit-scrollbar{width:6px}
  .side::-webkit-scrollbar-thumb{background:var(--panel-3);border-radius:6px}

  .brand{display:flex;align-items:center;gap:10px;padding:4px 6px 0}
  .brand .avatar{width:38px;height:38px;border-radius:50%;flex:none;
    background:radial-gradient(circle at 35% 30%,#d8a25c,#7a4b23 70%);
    display:grid;place-items:center;font-size:19px;border:2px solid rgba(0,0,0,.4)}
  .brand .name{font-family:"Baloo 2";font-weight:800;font-size:19px;line-height:1.05}
  .beta{display:inline-block;font-size:8.5px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;
    color:var(--gold);background:rgba(232,193,104,.12);border:1px solid rgba(232,193,104,.32);
    padding:1px 6px;border-radius:20px;margin-top:3px}

  .wallet{
    background:linear-gradient(150deg,rgba(232,193,104,.14),rgba(232,193,104,.04));
    border:1px solid rgba(232,193,104,.24);border-radius:var(--r-m);padding:11px 13px;
  }
  .wallet .k{color:var(--muted);font-size:10px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase}
  .wallet .v{display:flex;align-items:center;gap:7px;font-weight:800;font-size:21px;margin-top:3px}
  .wallet .v .key{font-size:15px}
  .wallet button{width:100%;margin-top:9px;background:linear-gradient(180deg,#F0D08A,var(--gold) 60%,var(--gold-deep));
    color:#3a2a08;font-weight:800;font-size:13px;padding:8px;border-radius:10px;transition:.15s}
  .wallet button:hover{filter:brightness(1.06)}
  .wallet button:disabled{opacity:.5; cursor:default; filter:none;}

  .s-label{color:var(--muted-2);font-size:9.5px;font-weight:800;letter-spacing:2.4px;padding:0 8px;margin-top:2px}
  .s-nav{display:flex;flex-direction:column;gap:2px}
  .s-nav a{
    display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--muted);
    font-weight:800;font-size:14px;padding:10px 12px;border-radius:12px;transition:.15s;position:relative;
  }
  .s-nav a .ic{width:20px;text-align:center;font-size:15px;opacity:.9}
  .s-nav a:hover{background:rgba(232,193,104,.06);color:var(--cream)}
  .s-nav a.on{background:var(--panel-3);color:var(--cream)}
  .s-nav a.on::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--gold)}
  .s-nav a .tag{margin-left:auto;font-size:9px;font-weight:800;letter-spacing:1px;color:var(--gold);
    background:rgba(232,193,104,.12);border:1px solid rgba(232,193,104,.28);padding:2px 6px;border-radius:20px}

  .side-foot{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding-top:10px;border-top:1px solid var(--line)}
  .s-user{display:flex;align-items:center;gap:10px;background:var(--panel-2);border:1px solid var(--line);
    border-radius:14px;padding:8px 10px}
  .s-user .pfp{width:34px;height:34px;border-radius:50%;flex:none;background:radial-gradient(circle at 35% 30%,#e6b7c9,#6d3e57);object-fit:cover;}
  .s-user .n{font-weight:800;font-size:13.5px;line-height:1.2}
  .s-user .s{color:var(--muted);font-size:11px;font-weight:700}
  .s-user .out{margin-left:auto;color:var(--muted-2);font-size:14px;transition:.15s}
  .s-user .out:hover{color:var(--red)}
  .wallet-login-btn{width:100%;background:linear-gradient(180deg,#F0D08A,var(--gold) 60%,var(--gold-deep));color:#3a2a08;
    font-family:"Baloo 2";font-weight:800;font-size:14px;padding:12px;border-radius:12px;transition:.15s}
  .wallet-login-btn:hover{filter:brightness(1.06)}

  /* ================= CONTENU ================= */
  .main{display:flex;flex-direction:column;gap:var(--gap);padding:16px clamp(16px,2.2vw,34px) 30px;min-width:0}

  .topbar{display:flex;align-items:center;gap:14px;flex:none}
  .topbar h1{font-size:28px;font-weight:800;line-height:1}
  .topbar .crumb{color:var(--muted-2);font-weight:800;font-size:11px;letter-spacing:2px;text-transform:uppercase}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:9px}
  .live{display:flex;align-items:center;gap:7px;color:var(--muted);font-weight:800;font-size:12px;
    background:var(--panel);border:1px solid var(--line);border-radius:30px;padding:7px 13px}
  .live .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.4s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .icon-btn{width:36px;height:36px;border-radius:12px;border:1px solid var(--line);background:var(--panel-2);
    display:grid;place-items:center;font-size:14px;color:var(--muted);transition:.15s}
  .icon-btn:hover{color:var(--gold);border-color:rgba(232,193,104,.3)}
  /* Cloche : mène au profil. La pastille n'apparaît que s'il y a des clés
     ou des succès à réclamer, pour ne pas créer de fausse alerte. */
  .bell-btn{position:relative; text-decoration:none;}
  .bell-dot{
    position:absolute; top:-3px; right:-3px; min-width:9px; height:9px; border-radius:20px;
    background:var(--red); border:2px solid var(--panel-2);
    animation:bellPulse 2s ease-in-out infinite;
  }
  @keyframes bellPulse{
    0%,100%{transform:scale(1); opacity:1;}
    50%{transform:scale(1.25); opacity:.75;}
  }
  .burger{display:none}

  /* ---------- Leaderboard ---------- */
  .lb-panel{display:flex;flex-direction:column;gap:22px}
  .lb-podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;padding:36px 20px 10px;flex-wrap:wrap}
  .lb-podium-card{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);
    border-radius:var(--r-l);padding:20px 18px 22px;text-align:center;display:flex;flex-direction:column;
    align-items:center;gap:6px;width:190px;position:relative;
  }
  .lb-podium-card.rank-1{order:2;border-color:rgba(232,193,104,.5);box-shadow:0 0 40px rgba(232,193,104,.15);z-index:1}
  .lb-podium-card.rank-2{order:1}
  .lb-podium-card.rank-3{order:3}
  .lb-podium-medal{
    position:absolute;top:-18px;left:50%;transform:translateX(-50%);width:38px;height:38px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-family:"Baloo 2";font-weight:800;font-size:16px;
    box-shadow:0 4px 10px rgba(0,0,0,.4);
  }
  .lb-podium-card.rank-1 .lb-podium-medal{background:linear-gradient(180deg,#F0D08A,var(--gold) 60%,var(--gold-deep));color:#3a2a08;width:46px;height:46px;font-size:19px;top:-22px}
  .lb-podium-card.rank-2 .lb-podium-medal{background:linear-gradient(180deg,#d9dde3,#9aa3ad);color:#20242a}
  .lb-podium-card.rank-3 .lb-podium-medal{background:linear-gradient(180deg,#e2b083,#a9723f);color:#3a2410}
  .lb-podium-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--line);margin-top:16px}
  .lb-podium-card.rank-1 .lb-podium-avatar{width:82px;height:82px;margin-top:20px}
  .lb-podium-name{font-family:"Baloo 2";font-weight:800;font-size:15px;color:var(--cream);margin-top:4px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .lb-podium-wager{color:var(--gold);font-weight:800;font-size:14px;display:flex;align-items:center;gap:5px;
    max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lb-podium-wager .lbl{color:var(--muted);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px}
  @media(max-width:700px){
    /* Les 3 cartes doivent tenir sur une seule ligne : on passe de largeurs
       fixes (qui débordaient et renvoyaient le 3e à la ligne) à des largeurs
       flexibles qui se partagent l'espace disponible. */
    .lb-podium{gap:7px; flex-wrap:nowrap; padding:30px 4px 10px; align-items:flex-end;}
    .lb-podium-card{width:auto; flex:1 1 0; min-width:0; padding:14px 7px 15px; gap:4px;}
    .lb-podium-avatar{width:44px; height:44px; margin-top:12px;}
    .lb-podium-card.rank-1 .lb-podium-avatar{width:54px; height:54px; margin-top:14px;}
    .lb-podium-medal{width:30px; height:30px; font-size:13px; top:-15px;}
    .lb-podium-card.rank-1 .lb-podium-medal{width:36px; height:36px; font-size:15px; top:-18px;}
    .lb-podium-name{font-size:12.5px;}
    .lb-podium-wager{font-size:12px; flex-direction:column; gap:1px; line-height:1.25;}
    .lb-podium-wager .lbl{font-size:8.5px; letter-spacing:.5px; margin-bottom:0;}
  }
  @media(max-width:360px){
    .lb-podium-name{font-size:11px;}
    .lb-podium-wager{font-size:11px;}
  }

  /* ---------- Paris ---------- */
  .bets{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);
    border-radius:var(--r-l);padding:16px 18px}
  .tabs{display:flex;gap:6px;margin-bottom:10px}
  .tabs button{padding:9px 17px;border-radius:30px;font-weight:800;font-size:13.5px;color:var(--muted);transition:.18s}
  .tabs button:hover{color:var(--cream)}
  .tabs button.on{background:var(--panel-3);color:var(--cream);border:1px solid var(--line)}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:620px}
  thead th{text-align:left;color:var(--muted-2);font-size:10.5px;letter-spacing:1.6px;font-weight:800;padding:7px 13px;text-transform:uppercase}
  thead th:nth-child(n+3){text-align:right}
  tbody td{padding:11px 13px;border-top:1px solid rgba(232,193,104,.05);font-weight:700;font-size:13.5px}
  tbody td:nth-child(n+3){text-align:right}
  tbody tr:hover{background:rgba(232,193,104,.04)}
  tbody tr.fresh{animation:pop .5s ease}
  @keyframes pop{from{background:rgba(232,193,104,.12)}to{background:transparent}}
  .g{display:flex;align-items:center;gap:8px;font-family:"Baloo 2";font-weight:700;font-size:14px}
  .g .ic{width:24px;height:24px;border-radius:8px;background:var(--panel-3);border:1px solid var(--line);display:grid;place-items:center;font-size:12px}
  .p{display:flex;align-items:center;gap:8px}
  .p .pfp{width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#9aa7c7,#3c455e);object-fit:cover;flex:none;}
  td.time{color:var(--muted)}
  .key{color:var(--gold)}
  .win{color:var(--green)}
  .lose{color:var(--muted)}

  /* ================= MOBILE (identique à la version previouse) ================= */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);
    opacity:0;pointer-events:none;transition:.25s;z-index:50}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;left:0;right:0;bottom:0;z-index:60;
    background:linear-gradient(180deg,#241c12,#191309);border-top:1px solid var(--line);
    border-radius:24px 24px 0 0;padding:12px 14px calc(16px + env(safe-area-inset-bottom));
    transform:translateY(105%);transition:transform .3s cubic-bezier(.22,.9,.3,1);
    box-shadow:0 -18px 44px rgba(0,0,0,.6);max-height:88vh;overflow-y:auto}
  .drawer.open{transform:translateY(0)}
  .handle{width:50px;height:4px;border-radius:4px;background:#4a4032;margin:3px auto 14px}
  .d-user{display:flex;align-items:center;gap:12px;background:var(--panel-2);border:1px solid var(--line);border-radius:18px;padding:11px 12px}
  .d-user .pfp{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#e6b7c9,#6d3e57);flex:none;object-fit:cover;}
  .d-user .n{font-weight:800;font-size:17px}
  .d-user .s{color:var(--muted);font-weight:600;font-size:13px;margin-top:1px}
  .d-out{margin-left:auto;width:38px;height:38px;border-radius:50%;background:rgba(242,109,109,.14);
    border:1px solid rgba(242,109,109,.3);color:var(--red);display:grid;place-items:center;font-size:15px;flex:none}
  .d-sep{height:1px;background:var(--line);margin:14px 4px}
  .d-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .d-item{background:var(--panel-2);border:1px solid var(--line);border-radius:13px;padding:13px 12px;
    font-weight:800;font-size:15px;text-align:left;display:flex;align-items:center;gap:9px;
    color:var(--cream);text-decoration:none}
  .d-item:active{background:var(--panel-3)}
  .d-label{color:var(--muted-2);font-size:10.5px;font-weight:800;letter-spacing:2.6px;margin:16px 4px 9px}

  @media(max-width:1240px){ :root{--side:76px} 
    .brand .name,.wallet .k,.wallet .v,.wallet button,.s-label,.s-nav a span:not(.ic),.s-user .n,.s-user .s,.s-user .out{display:none}
    .side{padding:14px 10px;align-items:center}
    .brand{justify-content:center;padding:0}
    .wallet{padding:8px;text-align:center;width:100%}
    .wallet::after{content:"🔑";font-size:16px}
    .wallet-login-btn{font-size:0;padding:12px;}
    .wallet-login-btn::after{content:"🎮";font-size:16px}
    .s-nav{width:100%}
    .s-nav a{justify-content:center;padding:11px 0}
    .s-user{padding:6px;justify-content:center}
    .game-wrap{grid-template-columns:280px 1fr}
  }
  @media(max-width:860px){
    :root{--chrome:250px}
    .app{grid-template-columns:1fr}
    .side{display:none}
    .main{padding:10px 12px 22px;gap:12px}
    .topbar{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);
      border-radius:22px;padding:7px 8px;gap:10px}
    .topbar h1{font-size:20px;padding-left:6px}
    .topbar .crumb,.live{display:none}
    .burger{display:flex;width:38px;height:38px;border-radius:50%;background:var(--panel-3);
      border:1px solid var(--line);flex-direction:column;gap:3.5px;align-items:center;justify-content:center}
    .burger span{display:block;width:15px;height:2px;background:var(--cream);border-radius:2px}
    .game-wrap{grid-template-columns:1fr}
    .board{order:1;padding:12px;gap:10px}
    .controls{order:2;border-right:none;border-top:1px solid var(--line);padding:14px;gap:10px}
    .grid{gap:6px;width:100%}
    .bet-btn{margin-top:2px}
    .bar-tools button:nth-child(n+3){display:none}
    .bets{padding:12px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ---------- Popup de drop (lien partagé sur Discord) ---------- */
  .drop-overlay{
    position:fixed; inset:0; z-index:220; background:rgba(0,0,0,.75); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; padding:20px;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .drop-overlay.show{opacity:1; pointer-events:auto;}
  .drop-modal{
    position:relative; width:100%; max-width:400px; text-align:center;
    background:linear-gradient(180deg,#241c12,#191309);
    border:1.5px solid rgba(232,193,104,.4); border-radius:22px; padding:34px 28px;
    box-shadow:0 30px 90px rgba(0,0,0,.6), 0 0 60px rgba(232,193,104,.12);
    transform:translateY(16px) scale(.97); transition:transform .25s ease;
  }
  .drop-overlay.show .drop-modal{transform:translateY(0) scale(1);}
  .drop-close{
    position:absolute; top:12px; right:15px; background:none; border:none;
    color:var(--muted); font-size:25px; line-height:1; padding:4px; cursor:pointer;
  }
  .drop-close:hover{color:var(--cream);}
  .drop-gift{font-size:48px; display:block; margin-bottom:6px; animation:dropPop .5s ease;}
  @keyframes dropPop{0%{transform:scale(.4); opacity:0;} 60%{transform:scale(1.15);} 100%{transform:scale(1); opacity:1;}}
  .drop-tag{color:var(--gold); font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase;}
  .drop-amount{font-family:"Baloo 2"; font-weight:800; font-size:42px; color:var(--gold); line-height:1.1; margin:8px 0 4px;}
  .drop-label{font-size:14px; color:var(--cream); font-weight:700;}
  .drop-slots{font-size:12.5px; color:var(--muted); margin-top:12px;}
  .drop-slots b{color:var(--gold);}
  .drop-msg{font-size:13.5px; color:var(--muted); line-height:1.6; margin-top:14px;}
  .drop-msg.ok{color:var(--green); font-weight:700;}
  .drop-msg.err{color:var(--red); font-weight:700;}
  .drop-btn{
    width:100%; margin-top:20px; padding:14px; border-radius:14px; border:none; cursor:pointer;
    background:linear-gradient(180deg,#F0D08A,var(--gold) 55%,var(--gold-deep)); color:#3a2a08;
    font-family:"Baloo 2"; font-weight:800; font-size:16px; transition:.15s;
    box-shadow:0 5px 16px rgba(232,193,104,.25);
  }
  .drop-btn:hover:not(:disabled){filter:brightness(1.06); transform:translateY(-1px);}
  .drop-btn:disabled{opacity:.5; filter:none; cursor:default; transform:none; box-shadow:none;}
  .drop-bar{height:6px; border-radius:4px; background:var(--bg-soft); margin-top:14px; overflow:hidden;}
  .drop-bar i{display:block; height:100%; background:linear-gradient(90deg,var(--gold-deep),var(--gold)); transition:width .4s ease;}

  /* ---------- Popup d'alerte (remplace alert() natif) ---------- */
  @keyframes reveal{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
  .custom-alert-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.65); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:200; padding:20px;
  }
  .custom-alert-overlay.show{display:flex;}
  .custom-alert-box{
    background:linear-gradient(180deg,#241c12,#191309); border:1px solid var(--line); border-radius:18px;
    padding:24px 26px; max-width:340px; width:100%; box-shadow:0 20px 50px rgba(0,0,0,.55);
    animation:reveal .18s ease;
  }
  .custom-alert-title{font-family:"Baloo 2"; font-weight:800; font-size:15px; color:var(--gold); margin-bottom:10px;}
  .custom-alert-msg{font-size:14.5px; color:var(--cream); line-height:1.5; margin-bottom:20px;}
  .custom-alert-btn{
    width:100%; background:linear-gradient(180deg,#F0D08A,var(--gold) 60%,var(--gold-deep)); color:#3a2a08;

<body>

<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="side">

      <div class="avatar">🦁</div>
      <div>
        <div class="name">Drop Cash</div>

    <div class="wallet">

      <div class="v"><span class="key">🔑</span> <b id="balance-sidebar">0</b></div>

  <div class="main">

<script src="nitrodrop-config.js?v=20260721a"></script>
<script>
  const CONFIG = nitrodropLoadPublishedConfig();
  const DISCORD_STORAGE_KEY = 'nitrodrop_discord_identity';
  const relayUrl = (CONFIG.telegramRelay && CONFIG.telegramRelay.url) || '';
  const workerBase = relayUrl.replace(/\/notify\/?$/, '');

  function formatLocalTime(dateMs){
    if (!dateMs) return '';
    return new Date(dateMs).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function isMobileDevice(){
    return /Android|iPhone|iPad|iPod|Mobi/i.test(navigator.userAgent);
  }

  function saveDiscordIdentity(discordId, username, avatarUrl){
    const payload = JSON.stringify({ discordId, username, avatarUrl });
    try{ localStorage.setItem(DISCORD_STORAGE_KEY, payload); }catch(e){}
    try{ document.cookie = DISCORD_STORAGE_KEY + '=' + encodeURIComponent(payload) + '; max-age=31536000; path=/; SameSite=Lax'; }catch(e){}
  }

  function clearDiscordIdentity(){
    try{ localStorage.removeItem(DISCORD_STORAGE_KEY); }catch(e){}
    try{ document.cookie = DISCORD_STORAGE_KEY + '=; max-age=0; path=/; SameSite=Lax'; }catch(e){}
  }

  function getSavedDiscordIdentity(){
    try{
      const raw = localStorage.getItem(DISCORD_STORAGE_KEY);
      if (raw){
        const parsed = JSON.parse(raw);
        if (parsed && parsed.discordId) return parsed;
      }
    }catch(e){}
    try{
      const match = document.cookie.match(new RegExp('(?:^|; )' + DISCORD_STORAGE_KEY + '=([^;]*)'));
      if (match){
        const raw = decodeURIComponent(match[1]);
        const parsed = JSON.parse(raw);
        if (parsed && parsed.discordId){
          try{ localStorage.setItem(DISCORD_STORAGE_KEY, raw); }catch(e){}
          return parsed;
        }
      }
    }catch(e){}
    return null;
  }

  function getSharedDiscordId(){ const s = getSavedDiscordIdentity(); return s ? s.discordId : ''; }
  function getSharedUsername(){ const s = getSavedDiscordIdentity(); return s ? s.username : ''; }
  function getSharedAvatarUrl(){ const s = getSavedDiscordIdentity(); return s ? (s.avatarUrl || '') : ''; }

  function connectDiscord(){
    const clientId = CONFIG.discordOAuth && CONFIG.discordOAuth.clientId;
    if (!clientId){ showAlert('Discord login has not been set up by the site administrator.'); return; }
    const redirectUri = `${location.origin}${location.pathname.replace(/[^/]*$/, '')}discord-callback.html`;
    const authUrl = `https://discord.com/oauth2/authorize?client_id=${encodeURIComponent(clientId)}` +
      `&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify%20guilds.join`;
    if (isMobileDevice()){
      try{ sessionStorage.setItem('nitrodrop_oauth_return', location.href); }catch(e){}
      window.location.href = authUrl;
      return;
    }
    window.open(authUrl, 'discord-oauth', 'width=500,height=750');
  }
</script>
<script>
// Popup d'alerte maison (remplace alert() natif du navigateur) — globale, utilisée
// aussi bien ici que dans le script d'identité partagé (connectDiscord, etc.)
const customAlertOverlay = document.getElementById('customAlertOverlay');
const customAlertMsg = document.getElementById('customAlertMsg');
function showAlert(message){
  customAlertMsg.textContent = message;
  customAlertOverlay.classList.add('show');
}
document.getElementById('customAlertOkBtn').addEventListener('click', () => {
  customAlertOverlay.classList.remove('show');
});

(async function(){
  const drawer=document.getElementById('drawer'), scrim=document.getElementById('scrim');
  const toggle=o=>{drawer.classList.toggle('open',o);scrim.classList.toggle('open',o);document.body.style.overflow=o?'hidden':''};
  document.getElementById('burger').addEventListener('click',()=>toggle(true));
  scrim.addEventListener('click',()=>toggle(false));
  document.addEventListener('keydown',e=>{if(e.key==='Escape')toggle(false)});
  drawer.querySelectorAll('.d-item').forEach(b=>b.addEventListener('click',()=>toggle(false)));

  const balanceSidebarEl=document.getElementById('balance-sidebar');
  const lbPodium=document.getElementById('lbPodium'), lbList=document.getElementById('lbList');


  // Pastille de la cloche : allumée quand des clés du jour attendent le joueur.
  function updateBellDot(data){
    const dot = document.getElementById('bell-dot');
    if (!dot) return;
    const pending = data && data.rewards && (data.rewards.daily || data.rewards.achievements);
    dot.style.display = pending ? '' : 'none';
  }

  function setBalance(v){
    balanceSidebarEl.textContent = v;
  }

  function medalIcon(rank){
    return rank === 1 ? '🥇' : rank === 2 ? '🥈' : '🥉';
  }

  function renderPodium(top3){
    if (top3.length === 0){ lbPodium.innerHTML = ''; return; }
    // Ordre visuel : #2, #1, #3 (le #1 est centré et mis en avant via CSS order)
    lbPodium.innerHTML = top3.map((p, i) => {
      const rank = i + 1;
      const avatarSrc = p.avatarUrl || 'https://cdn.discordapp.com/embed/avatars/0.png';
      return `
        <div class="lb-podium-card rank-${rank}">
          <div class="lb-podium-medal">${medalIcon(rank)}</div>
          <img class="lb-podium-avatar" src="${escapeHtml(avatarSrc)}" alt="" referrerpolicy="no-referrer">
          <div class="lb-podium-name">${escapeHtml(p.pseudo || '?')}</div>
          <div class="lb-podium-wager"><span class="lbl">Wagered</span>🔑 ${escapeHtml(String(p.wager))}</div>
        </div>
      `;
    }).join('');
  }

  function renderList(rest){
    if (rest.length === 0){
      lbList.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px; color:var(--muted);">Not enough players ranked yet.</td></tr>';
      return;
    }
    lbList.innerHTML = rest.map((p, i) => {
      const rank = i + 4; // la liste commence au rang 4 (le podium couvre 1-3)
      const avatarSrc = p.avatarUrl || 'https://cdn.discordapp.com/embed/avatars/0.png';
      return `
        <tr>
          <td style="font-weight:800; color:var(--muted);">#${rank}</td>
          <td><span class="p"><img class="pfp" src="${escapeHtml(avatarSrc)}" alt="" referrerpolicy="no-referrer">${escapeHtml(p.pseudo||'?')}</span></td>
          <td><span class="key">🔑</span> ${escapeHtml(String(p.wager))}</td>
        </tr>
      `;
    }).join('');
  }

  async function loadLeaderboard(){
    if (!workerBase){ lbPodium.innerHTML=''; lbList.innerHTML=''; return; }
    try{
      const resp = await fetch(`${workerBase}/leaderboard?limit=22`);
      const data = await resp.json();
      const list = data.leaderboard || [];
      renderPodium(list.slice(0, 3));
      renderList(list.slice(3, 22));
    }catch(e){
      lbList.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px; color:var(--muted);">Could not load the leaderboard.</td></tr>';
    }
  }

  // ---------------- Compteur de visiteurs (affichage simple, pas de vraie mesure) ----------------
  document.getElementById('visitor-count').textContent = String(20 + Math.floor(Math.random() * 11));

  // ---------------- Badge du nombre d'offres (lu depuis la config, jamais codé en dur) ----------------
  (function updateBonusCount(){
    const el = document.getElementById('bonus-count');
    if (!el) return;
    try{
      let lang = localStorage.getItem('nitrodrop_lang') || CONFIG.defaultLang || 'en';
      if (!CONFIG.content || !CONFIG.content[lang]) lang = CONFIG.defaultLang || 'en';
      const offers = CONFIG.content && CONFIG.content[lang] && CONFIG.content[lang].offers;
      if (offers && offers.length){
        el.textContent = String(offers.length);
      } else {
        el.style.display = 'none';
      }
    }catch(e){
      el.style.display = 'none';
    }
  })();

  // ---------------- Identité ----------------
  async function applyIdentity(){
    const saved = getSavedDiscordIdentity();
    const sideLoginBtn = document.getElementById('side-login-btn');
    const sideUser = document.getElementById('side-user');
    const sideUserPseudo = document.getElementById('side-user-pseudo');
    const sideUserPfp = document.getElementById('side-user-pfp');
    const drawerPseudo = document.getElementById('drawer-pseudo');
    const drawerPfp = document.getElementById('drawer-user-pfp');
    const drawerLogoutBtn = document.getElementById('drawer-logout-btn');
    const fallbackAvatar = 'https://cdn.discordapp.com/embed/avatars/0.png';

    if (saved && saved.discordId){
      sideLoginBtn.style.display = 'none';
      sideUser.style.display = 'flex';
      sideUserPseudo.textContent = saved.username;
      sideUserPfp.src = saved.avatarUrl || fallbackAvatar;
      drawerPseudo.textContent = saved.username;
      drawerPfp.src = saved.avatarUrl || fallbackAvatar;
      drawerLogoutBtn.style.display = 'grid';
      const keys = await getKeysStatus(saved.discordId);
      setBalance(keys);
    } else {
      sideLoginBtn.style.display = 'block';
      sideUser.style.display = 'none';
      drawerPseudo.textContent = 'Not connected';
      drawerLogoutBtn.style.display = 'none';
      setBalance('0');
    }
  }

  async function getKeysStatus(discordId){
    if (!workerBase) return '0';
    try{
      const resp = await fetch(`${workerBase}/mines/status?discordId=${encodeURIComponent(discordId)}`);
      const data = await resp.json();
      updateBellDot(data);
      return data.keys;
    }catch(e){ return '0'; }
  }

  document.getElementById('side-logout-btn').addEventListener('click', () => {
    clearDiscordIdentity();
    applyIdentity();
  });
  document.getElementById('drawer-logout-btn').addEventListener('click', () => {
    clearDiscordIdentity();
    applyIdentity();
    toggle(false);
  });

  window.addEventListener('message', (event) => {
    if (!event.data || event.data.type !== 'nitrodrop-discord-auth') return;
    saveDiscordIdentity(event.data.discordId, event.data.username, event.data.avatarUrl);
    applyIdentity();
  });

  applyIdentity();
  loadLeaderboard();

  // ---------------- Popup de drop (lien Discord ?drop=ID) ----------------
  (function initDrop(){
    const dropId = new URLSearchParams(location.search).get('drop');
    if (!dropId) return;

    const overlay = document.getElementById('dropOverlay');
    const bodyEl = document.getElementById('dropBody');
    if (!overlay || !bodyEl) return;

    const close = () => {
      overlay.classList.remove('show');
      document.body.style.overflow = '';
      // Retire le paramètre pour éviter de rouvrir la popup au rechargement
      const url = new URL(location.href);
      url.searchParams.delete('drop');
      history.replaceState({}, '', url);
    };
    document.getElementById('dropClose').addEventListener('click', close);
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

    const show = html => {
      bodyEl.innerHTML = html;
      overlay.classList.add('show');
      document.body.style.overflow = 'hidden';
    };

    const fmtKeys = n => (Math.round((Number(n)||0) * 100) / 100).toLocaleString('en-US');

    async function load(){
      const discordId = getSharedDiscordId();
      try{
        const resp = await fetch(`${workerBase}/drop/status?id=${encodeURIComponent(dropId)}` +
          (discordId ? `&discordId=${encodeURIComponent(discordId)}` : ''));
        const data = await resp.json();

        if (!data.ok){
          show(`<span class="drop-gift">😕</span>
                <div class="drop-tag">Drop</div>
                <div class="drop-label" style="margin-top:10px;">This drop doesn't exist or has expired.</div>`);
          return;
        }

        const d = data.drop;
        const pct = d.totalSlots ? Math.round((d.claimedSlots / d.totalSlots) * 100) : 100;
        const head = `
          <span class="drop-gift">🎁</span>
          <div class="drop-tag">Drop Cash reward</div>
          <div class="drop-amount">🔑 ${fmtKeys(d.amount)}</div>
          ${d.label ? `<div class="drop-label">${escapeHtml(d.label)}</div>` : ''}
          <div class="drop-slots"><b>${d.remaining}</b> of ${d.totalSlots} spots left</div>
          <div class="drop-bar"><i style="width:${pct}%"></i></div>`;

        if (!d.active){
          show(head + `<div class="drop-msg err">This drop is closed.</div>`);
          return;
        }
        if (data.alreadyClaimed){
          show(head + `<div class="drop-msg ok">✓ You already claimed this drop.</div>`);
          return;
        }
        if (d.remaining <= 0){
          show(head + `<div class="drop-msg err">All spots have been taken. Better luck next time!</div>`);
          return;
        }
        if (!discordId){
          show(head + `<div class="drop-msg">Connect with Discord to claim your keys.</div>
                       <button class="drop-btn" id="dropConnect">🎮 Connect with Discord</button>`);
          document.getElementById('dropConnect').addEventListener('click', () => connectDiscord());
          return;
        }
        show(head + `<button class="drop-btn" id="dropClaim">Claim ${fmtKeys(d.amount)} keys</button>`);
        document.getElementById('dropClaim').addEventListener('click', claim);
      }catch(e){
        show(`<span class="drop-gift">😕</span>
              <div class="drop-label" style="margin-top:10px;">Could not load this drop.</div>`);
      }
    }

    async function claim(){
      const btn = document.getElementById('dropClaim');
      btn.disabled = true;
      btn.textContent = 'Claiming…';
      try{
        const resp = await fetch(`${workerBase}/drop/claim`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            id: dropId,
            discordId: getSharedDiscordId(),
            pseudo: getSharedUsername(),
            avatarUrl: getSharedAvatarUrl(),
          }),
        });
        const data = await resp.json();
        if (!data.ok){
          const msgs = {
            already_claimed: '✓ You already claimed this drop.',
            no_slots_left: 'All spots have been taken. Better luck next time!',
            inactive: 'This drop is closed.',
            banned: 'Your account has been banned from the games.',
            missing_discord: 'Connect with Discord to claim your keys.',
          };
          btn.outerHTML = `<div class="drop-msg err">${msgs[data.reason] || 'Could not claim this drop.'}</div>`;
          return;
        }
        // Met à jour le solde affiché dans la barre latérale si elle existe
        const bal = document.getElementById('balance-sidebar');
        if (bal) bal.textContent = fmtKeys(data.keys);
        btn.outerHTML = `<div class="drop-msg ok">✓ ${fmtKeys(data.amount)} keys added to your balance!</div>`;
      }catch(e){
        btn.disabled = false;
        btn.textContent = 'Try again';
      }
    }

    load();
    // Si le joueur se connecte depuis la popup, on la recharge
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'nitrodrop-discord-auth') setTimeout(load, 400);
    });
  })();

})();
</script>
