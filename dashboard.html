<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NITRODROP — Historique des demandes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07070C; --bg-raise:#100F1C; --bg-card:#131226;
    --line:rgba(255,255,255,0.08); --line-strong:rgba(255,255,255,0.16);
    --green:#B6FF3C; --violet:#8B5CFF;
    --text:#F1F0FA; --text-dim:#9591B0; --text-faint:#5F5C77;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; padding:0 0 100px;}
  .topbar{
    position:sticky; top:0; z-index:10; background:rgba(7,7,12,0.9); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); padding:18px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  .topbar h1{font-family:'Unbounded'; font-size:18px; font-weight:900;}
  .topbar h1 span{color:var(--green);}
  .wrap{max-width:1500px; margin:0 auto; padding:24px 32px;}
  .toolbar{display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:20px;}
  select, input[type=text]{
    background:var(--bg-card); border:1px solid var(--line-strong); border-radius:9px;
    padding:10px 14px; color:var(--text); font-size:13.5px; font-family:'Inter';
  }
  .btn{
    border:none; border-radius:9px; padding:10px 16px; font-weight:700; font-size:13px; cursor:pointer;
    background:var(--bg-card); border:1px solid var(--line-strong); color:var(--text);
  }
  .btn.primary{background:var(--green); color:#08130a; border-color:transparent;}
  .stats{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px;}
  .stat{
    background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:14px 18px; min-width:120px;
  }
  .stat .n{font-family:'Unbounded'; font-weight:900; font-size:22px; color:var(--green);}
  .stat .l{font-size:11.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.04em; margin-top:4px;}
  table{width:100%; border-collapse:collapse; background:var(--bg-card); border-radius:14px; border:1px solid var(--line); font-size:12px;}
  th{
    text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.03em; color:var(--text-faint);
    padding:9px 10px; background:var(--bg-raise); border-bottom:1px solid var(--line-strong); white-space:nowrap;
  }
  td{padding:8px 10px; font-size:12px; border-bottom:1px solid var(--line); vertical-align:middle;}
  .cell-truncate{max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; cursor:help;}
  #table-scroll{overflow-x:auto; border-radius:14px;}
  #table-scroll::-webkit-scrollbar{height:8px;}
  #table-scroll::-webkit-scrollbar-thumb{background:var(--line-strong); border-radius:4px;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .mono{font-family:'JetBrains Mono'; font-size:12px; color:var(--text-dim);}
  .badge{
    display:inline-block; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:700;
    background:var(--bg-raise); border:1px solid var(--line-strong); color:var(--text-dim);
  }
  input[type=checkbox]{width:18px; height:18px; cursor:pointer; accent-color:var(--green);}
  .pagination{display:flex; gap:8px; justify-content:center; align-items:center; margin-top:20px; font-size:13px; color:var(--text-dim);}
  .empty{padding:60px; text-align:center; color:var(--text-faint);}
  .gate{
    min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px;
  }
  .gate input{width:280px; text-align:center;}
  .gate .err{color:#FF7A90; font-size:13px;}
</style>
</head>
<body>

<div id="gate" class="gate">
  <h1 style="font-family:'Unbounded'; font-size:20px;">NITRO<span style="color:var(--green);">DROP</span></h1>
  <div style="color:var(--text-dim); font-size:13.5px;">Clé du dashboard</div>
  <input type="text" id="gate-key" placeholder="Colle ta clé ici" autofocus>
  <button class="btn primary" onclick="unlockDashboard()">Accéder</button>
  <div class="err" id="gate-error"></div>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <h1>NITRO<span>DROP</span> — Historique des demandes</h1>
    <button class="btn" onclick="loadSubmissions()">Rafraîchir</button>
  </div>

  <div class="wrap">
    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <select id="filter-casino" onchange="applyFilters()">
        <option value="">Tous les casinos</option>
      </select>
      <input type="text" id="filter-search" placeholder="Rechercher pseudo / email / IP / Discord..." oninput="applyFilters()" style="min-width:220px;">
      <select id="filter-tipped" onchange="applyFilters()">
        <option value="">Tipsé : tous</option>
        <option value="yes">Tipsé : oui</option>
        <option value="no">Tipsé : non</option>
      </select>
      <select id="filter-archived" onchange="applyFilters()">
        <option value="active">Actives</option>
        <option value="archived">Archivées</option>
        <option value="all">Toutes</option>
      </select>
      <select id="filter-suspicion" onchange="applyFilters()">
        <option value="">Suspicion : tous</option>
        <option value="high">Suspicion : élevée</option>
        <option value="medium">Suspicion : moyenne+</option>
        <option value="low">Suspicion : faible uniquement</option>
        <option value="none">Suspicion : aucune</option>
      </select>
      <select id="filter-already-paid" onchange="applyFilters()">
        <option value="">Déjà payé : tous</option>
        <option value="yes">🚩 Déjà payé (rouge)</option>
        <option value="regular">✓ Client régulier (vert)</option>
        <option value="no">Aucun signal</option>
      </select>
    </div>

    <div id="table-container"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
  const PAGE_SIZE = 20;
  let dashboardKey = '';
  let allSubmissions = [];
  let filtered = [];
  let currentPage = 1;
  let workerBaseUrl = '';

  function unlockDashboard(){
    const key = document.getElementById('gate-key').value.trim();
    const urlInput = prompt('URL de base de ton Worker (ex: https://nitrodrop-relay.tonpseudo.workers.dev) :', localStorage.getItem('nitrodrop_worker_base') || '');
    if (!urlInput){
      document.getElementById('gate-error').textContent = 'URL du Worker requise.';
      return;
    }
    workerBaseUrl = urlInput.trim().replace(/\/$/, '');
    localStorage.setItem('nitrodrop_worker_base', workerBaseUrl);
    dashboardKey = key;
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadSubmissions();
  }

  // ---------- Score de suspicion (croisement IP / Discord ID / email / pseudo similaires) ----------
  function normalizeBase(str){
    // enlève les chiffres de fin + caractères spéciaux, pour comparer "karol0978" et "karol0976"
    return String(str || '').toLowerCase().replace(/[^a-z0-9]/g, '').replace(/[0-9]+$/, '');
  }

  function ipPrefix(ip){
    // Large volontairement (on préfère capter trop de cas que d'en rater) :
    // IPv4 : les 2 premiers blocs (ex: "91.94.100.213" -> "91.94")
    // IPv6 : les 3 premiers groupes (ex: "2a00:f41:1431:83da..." -> "2a00:f41:1431")
    if (!ip) return '';
    if (ip.includes(':')){
      return ip.split(':').slice(0, 3).join(':').toLowerCase();
    }
    return ip.split('.').slice(0, 2).join('.');
  }

  function computeAlreadyPaidFlags(submissions){
    submissions.forEach(s => {
      const tippedOthers = submissions.filter(o =>
        o.id !== s.id && o.platform === s.platform && o.tipped
      );

      const isSameIdentity = o =>
        o.discordId && s.discordId && o.discordId === s.discordId &&
        o.email && s.email && o.email.toLowerCase() === s.email.toLowerCase() &&
        o.pseudo && s.pseudo && o.pseudo.toLowerCase() === s.pseudo.toLowerCase();

      // Priorité au drapeau rouge : un signal (IP/Discord/email/pseudo) partagé avec une identité DIFFÉRENTE
      const suspiciousMatch = tippedOthers.find(o => {
        if (isSameIdentity(o)) return false; // ce n'est pas suspect, c'est le retour légitime lui-même
        return (
          (o.discordId && o.discordId === s.discordId) ||
          (o.email && s.email && o.email.toLowerCase() === s.email.toLowerCase()) ||
          (o.ip && s.ip && ipPrefix(o.ip) === ipPrefix(s.ip) && ipPrefix(s.ip) !== '') ||
          (normalizeBase(o.pseudo).length >= 3 && normalizeBase(o.pseudo) === normalizeBase(s.pseudo))
        );
      });

      if (suspiciousMatch){
        s._alreadyPaidMatch = suspiciousMatch;
        s._returningCustomerMatch = null;
        return;
      }

      // Sinon seulement : retour légitime (pseudo + Discord + email identiques, ET aucun signal
      // suspect ailleurs dans le score de suspicion général — sinon on ne rassure pas à tort)
      const legitimateReturn = tippedOthers.find(isSameIdentity);
      if (legitimateReturn && (s._suspicionScore || 0) < 20){
        s._alreadyPaidMatch = null;
        s._returningCustomerMatch = legitimateReturn;
      } else {
        s._alreadyPaidMatch = null;
        s._returningCustomerMatch = null;
      }
    });
  }

  function computeSuspicionScores(submissions){
    submissions.forEach(s => {
      s._reasons = [];
      let score = 0;

      const sameIp = submissions.filter(o => o.id !== s.id && o.platform === s.platform && o.ip && o.ip !== 'inconnue' && ipPrefix(o.ip) === ipPrefix(s.ip) && ipPrefix(s.ip) !== '');
      if (sameIp.length){
        score += Math.min(sameIp.length * 25, 50);
        s._reasons.push(`IP du même bloc que (même casino) : ${[...new Set(sameIp.map(o => o.pseudo))].join(', ')}`);
      }

      const sameDiscord = submissions.filter(o => o.id !== s.id && o.platform === s.platform && o.discordId && o.discordId === s.discordId);
      if (sameDiscord.length){
        score += Math.min(sameDiscord.length * 40, 60);
        s._reasons.push(`Même ID Discord que (même casino) : ${[...new Set(sameDiscord.map(o => o.pseudo))].join(', ')}`);
      }

      const sameEmail = submissions.filter(o => o.id !== s.id && o.platform === s.platform && o.email && o.email.toLowerCase() === (s.email || '').toLowerCase());
      if (sameEmail.length){
        score += Math.min(sameEmail.length * 15, 30);
        s._reasons.push(`Même email que (même casino) : ${[...new Set(sameEmail.map(o => o.pseudo))].join(', ')}`);
      }

      const base = normalizeBase(s.pseudo);
      if (base.length >= 3){
        const similarPseudo = submissions.filter(o => o.id !== s.id && o.platform === s.platform && o.pseudo !== s.pseudo && normalizeBase(o.pseudo) === base);
        if (similarPseudo.length){
          score += Math.min(similarPseudo.length * 15, 30);
          s._reasons.push(`Pseudo très proche de (même casino) : ${[...new Set(similarPseudo.map(o => o.pseudo))].join(', ')}`);
        }
      }

      const emailLocal = normalizeBase((s.email || '').split('@')[0]);
      if (emailLocal.length >= 3){
        const similarEmail = submissions.filter(o => o.id !== s.id && o.platform === s.platform && o.email !== s.email && normalizeBase((o.email || '').split('@')[0]) === emailLocal);
        if (similarEmail.length){
          score += Math.min(similarEmail.length * 10, 20);
          s._reasons.push(`Email très proche de (même casino) : ${[...new Set(similarEmail.map(o => o.email))].join(', ')}`);
        }
      }

      s._suspicionScore = Math.min(score, 100);
    });
  }

  async function loadSubmissions(){
    document.getElementById('table-container').innerHTML = '<div class="empty">Chargement…</div>';
    try{
      const resp = await fetch(`${workerBaseUrl}/submissions`, {
        headers: { 'X-Dashboard-Key': dashboardKey }
      });
      if (resp.status === 401){
        document.getElementById('app').style.display = 'none';
        document.getElementById('gate').style.display = 'flex';
        document.getElementById('gate-error').textContent = 'Clé incorrecte ou secret DASHBOARD_KEY non configuré sur le Worker.';
        return;
      }
      if (!resp.ok) throw new Error('Erreur ' + resp.status);
      const data = await resp.json();
      allSubmissions = (data.submissions || []).slice().reverse(); // plus récent en premier
      computeSuspicionScores(allSubmissions);
      computeAlreadyPaidFlags(allSubmissions);

      const casinos = [...new Set(allSubmissions.map(s => s.platform))].sort();
      const sel = document.getElementById('filter-casino');
      sel.innerHTML = '<option value="">Tous les casinos</option>' +
        casinos.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');

      applyFilters();
    }catch(err){
      console.error(err);
      document.getElementById('table-container').innerHTML =
        `<div class="empty">Erreur de chargement : ${escapeHtml(err.message)}<br>Vérifie l'URL du Worker et ta clé.</div>`;
    }
  }

  function applyFilters(){
    const casino = document.getElementById('filter-casino').value;
    const search = document.getElementById('filter-search').value.toLowerCase();
    const tippedFilter = document.getElementById('filter-tipped').value;
    const archivedFilter = document.getElementById('filter-archived').value;
    const suspicionFilter = document.getElementById('filter-suspicion').value;
    const alreadyPaidFilter = document.getElementById('filter-already-paid').value;

    filtered = allSubmissions.filter(s => {
      if (archivedFilter === 'active' && s.archived) return false;
      if (archivedFilter === 'archived' && !s.archived) return false;
      if (suspicionFilter === 'high' && (s._suspicionScore || 0) < 50) return false;
      if (suspicionFilter === 'medium' && (s._suspicionScore || 0) < 20) return false;
      if (suspicionFilter === 'low' && ((s._suspicionScore || 0) === 0 || (s._suspicionScore || 0) >= 20)) return false;
      if (suspicionFilter === 'none' && (s._suspicionScore || 0) !== 0) return false;
      if (alreadyPaidFilter === 'yes' && !s._alreadyPaidMatch) return false;
      if (alreadyPaidFilter === 'regular' && !s._returningCustomerMatch) return false;
      if (alreadyPaidFilter === 'no' && (s._alreadyPaidMatch || s._returningCustomerMatch)) return false;
      if (casino && s.platform !== casino) return false;
      if (tippedFilter === 'yes' && !s.tipped) return false;
      if (tippedFilter === 'no' && s.tipped) return false;
      if (search){
        const haystack = `${s.pseudo || ''} ${s.email || ''} ${s.ip || ''} ${s.discordId || ''} ${s.platform || ''} ${s.code || ''}`.toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    currentPage = 1;
    renderStats();
    renderTable();
    renderPagination();
  }

  function renderStats(){
    const total = filtered.length;
    const tippedCount = filtered.filter(s => s.tipped).length;
    const statsEl = document.getElementById('stats');
    statsEl.innerHTML = `
      <div class="stat"><div class="n">${total}</div><div class="l">Demandes</div></div>
      <div class="stat"><div class="n">${tippedCount}</div><div class="l">Tipsées</div></div>
      <div class="stat"><div class="n">${total - tippedCount}</div><div class="l">En attente</div></div>
    `;
  }

  function renderSuspicionBadge(s){
    const score = s._suspicionScore || 0;
    if (score === 0) return `<span style="color:var(--text-faint); font-size:11.5px;">—</span>`;
    let color, label;
    if (score >= 50){ color = '#FF7A90'; label = 'Élevée'; }
    else if (score >= 20){ color = '#FFC759'; label = 'Moyenne'; }
    else { color = 'var(--text-dim)'; label = 'Faible'; }
    const reasons = (s._reasons || []).join(' • ');
    return `<span title="${escapeHtml(reasons)}" style="display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; background:${color}22; color:${color}; cursor:help;">${score} · ${label}</span>`;
  }

  function renderAlreadyPaidBadge(s){
    if (s._returningCustomerMatch){
      const m = s._returningCustomerMatch;
      const detail = `Client déjà tipsé le ${m.date || '?'} (même pseudo/Discord/email)`;
      return `<span title="${escapeHtml(detail)}" style="display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; background:var(--green)22; color:var(--green); cursor:help;">✓ Client régulier</span>`;
    }
    const match = s._alreadyPaidMatch;
    if (!match) return `<span style="color:var(--text-faint); font-size:11.5px;">—</span>`;
    const detail = `Déjà tipsé : ${match.pseudo || '?'} le ${match.date || '?'}`;
    return `<span title="${escapeHtml(detail)}" style="display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; background:#FF7A9022; color:#FF7A90; cursor:help;">🚩 Déjà payé</span>`;
  }

  function renderTable(){
    const container = document.getElementById('table-container');
    if (filtered.length === 0){
      container.innerHTML = '<div class="empty">Aucune demande trouvée.</div>';
      return;
    }
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageItems = filtered.slice(start, start + PAGE_SIZE);

    const rows = pageItems.map(s => `
      <tr style="${s.archived ? 'opacity:0.45;' : ''}">
        <td class="mono">${escapeHtml(formatLocalDate(s))}</td>
        <td><span class="badge">${escapeHtml(s.platform || '')}</span></td>
        <td><span class="cell-truncate" style="max-width:100px;" title="${escapeHtml(s.pseudo || '')}">${escapeHtml(s.pseudo || '')}</span></td>
        <td class="mono"><span class="cell-truncate" title="${escapeHtml(s.email || '')}">${escapeHtml(s.email || '')}</span></td>
        <td class="mono"><span class="cell-truncate" title="${escapeHtml(s.ip || '')} ${s.country ? '(' + escapeHtml(s.country) + ')' : ''}">${escapeHtml(s.ip || '')} ${s.country ? '(' + escapeHtml(s.country) + ')' : ''}</span></td>
        <td class="mono"><span class="cell-truncate" style="max-width:110px;" title="${escapeHtml(s.discordId || '—')}">${escapeHtml(s.discordId || '—')}</span></td>
        <td>${renderSuspicionBadge(s)}</td>
        <td>${renderAlreadyPaidBadge(s)}</td>
        <td style="text-align:center;">
          <input type="checkbox" ${s.tipped ? 'checked' : ''} onchange="toggleTipped('${s.id}', this.checked)">
        </td>
        <td style="text-align:center;">
          <button class="btn" style="padding:5px 10px; font-size:11.5px; white-space:nowrap;" onclick="toggleArchived('${s.id}', ${!s.archived})">
            ${s.archived ? 'Désarchiver' : 'Archiver'}
          </button>
        </td>
      </tr>
    `).join('');

    container.innerHTML = `
      <div id="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Casino</th><th>Pseudo</th><th>Email</th><th>IP</th><th>Discord</th><th>Suspicion</th><th>Déjà payé</th><th>Tipsé</th><th>Archive</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      </div>
    `;
  }

  function renderPagination(){
    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    const el = document.getElementById('pagination');
    el.innerHTML = `
      <button class="btn" onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>← Précédent</button>
      <span>Page ${currentPage} / ${totalPages}</span>
      <button class="btn" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>Suivant →</button>
    `;
  }

  function goToPage(page){
    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderTable();
    renderPagination();
  }

  async function toggleTipped(id, tipped){
    try{
      const resp = await fetch(`${workerBaseUrl}/submissions/tip`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Dashboard-Key': dashboardKey },
        body: JSON.stringify({ id, tipped })
      });
      if (!resp.ok) throw new Error('Échec de la sauvegarde');
      const data = await resp.json();
      const entry = allSubmissions.find(s => s.id === id);
      if (entry) entry.tipped = tipped;
      renderStats();

      if (tipped && data.discord && data.discord.attempted){
        if (data.discord.ok){
          showBanner('✅ DM Discord de confirmation envoyé avec succès.');
        } else {
          showBanner('⚠️ Coché "Tipsé", mais le DM Discord a échoué : ' + (data.discord.error || 'raison inconnue'), true);
        }
      } else if (tipped && !data.discord.attempted){
        showBanner('ℹ️ Coché "Tipsé" — aucun ID Discord fourni pour cette demande, pas de DM envoyé.');
      }
    }catch(err){
      alert('Erreur : ' + err.message);
    }
  }

  function showBanner(msg, isError){
    let banner = document.getElementById('discord-banner');
    if (!banner){
      banner = document.createElement('div');
      banner.id = 'discord-banner';
      banner.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:12px 20px; border-radius:10px; font-size:13px; font-weight:600; z-index:100; max-width:90vw;';
      document.body.appendChild(banner);
    }
    banner.style.background = isError ? 'rgba(255,122,144,0.15)' : 'rgba(182,255,60,0.15)';
    banner.style.border = isError ? '1px solid #FF7A90' : '1px solid var(--green)';
    banner.style.color = isError ? '#FF7A90' : 'var(--green)';
    banner.textContent = msg;
    clearTimeout(banner._timeout);
    banner._timeout = setTimeout(() => banner.remove(), 5000);
  }

  async function toggleArchived(id, archived){
    try{
      const resp = await fetch(`${workerBaseUrl}/submissions/archive`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Dashboard-Key': dashboardKey },
        body: JSON.stringify({ id, archived })
      });
      if (!resp.ok) throw new Error('Échec de la sauvegarde');
      const entry = allSubmissions.find(s => s.id === id);
      if (entry) entry.archived = archived;
      applyFilters(); // ré-applique le filtre courant pour faire disparaître/réapparaître la ligne si besoin
    }catch(err){
      alert('Erreur : ' + err.message);
    }
  }

  function formatLocalDate(s){
    let d;
    if (typeof s.dateMs === 'number'){
      d = new Date(s.dateMs);
    } else if (s.date){
      // "2026-07-18 03:04:38 UTC" -> format ISO parsable de façon fiable
      const iso = s.date.replace(' UTC', '').replace(' ', 'T') + 'Z';
      d = new Date(iso);
    }
    if (!d || isNaN(d.getTime())) return s.date || '';

    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
  }
</script>

</body>
