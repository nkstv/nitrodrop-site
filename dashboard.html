<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NITRODROP — Historique des demandes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07070C; --bg-raise:#100F1C; --bg-card:#131226;
    --line:rgba(255,255,255,0.08); --line-strong:rgba(255,255,255,0.16);
    --green:#B6FF3C; --violet:#8B5CFF;
    --text:#F1F0FA; --text-dim:#9591B0; --text-faint:#5F5C77;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; padding:0 0 100px;}
  .topbar{
    position:sticky; top:0; z-index:10; background:rgba(7,7,12,0.9); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); padding:18px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  .topbar h1{font-family:'Unbounded'; font-size:18px; font-weight:900;}
  .topbar h1 span{color:var(--green);}
  .wrap{max-width:1200px; margin:0 auto; padding:24px 32px;}
  .toolbar{display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:20px;}
  select, input[type=text]{
    background:var(--bg-card); border:1px solid var(--line-strong); border-radius:9px;
    padding:10px 14px; color:var(--text); font-size:13.5px; font-family:'Inter';
  }
  .btn{
    border:none; border-radius:9px; padding:10px 16px; font-weight:700; font-size:13px; cursor:pointer;
    background:var(--bg-card); border:1px solid var(--line-strong); color:var(--text);
  }
  .btn.primary{background:var(--green); color:#08130a; border-color:transparent;}
  .stats{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px;}
  .stat{
    background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:14px 18px; min-width:120px;
  }
  .stat .n{font-family:'Unbounded'; font-weight:900; font-size:22px; color:var(--green);}
  .stat .l{font-size:11.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.04em; margin-top:4px;}
  table{width:100%; border-collapse:collapse; background:var(--bg-card); border-radius:14px; overflow:hidden; border:1px solid var(--line);}
  th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-faint);
    padding:12px 14px; background:var(--bg-raise); border-bottom:1px solid var(--line-strong);
  }
  td{padding:12px 14px; font-size:13px; border-bottom:1px solid var(--line); vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .mono{font-family:'JetBrains Mono'; font-size:12px; color:var(--text-dim);}
  .badge{
    display:inline-block; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:700;
    background:var(--bg-raise); border:1px solid var(--line-strong); color:var(--text-dim);
  }
  input[type=checkbox]{width:18px; height:18px; cursor:pointer; accent-color:var(--green);}
  .pagination{display:flex; gap:8px; justify-content:center; align-items:center; margin-top:20px; font-size:13px; color:var(--text-dim);}
  .empty{padding:60px; text-align:center; color:var(--text-faint);}
  .gate{
    min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px;
  }
  .gate input{width:280px; text-align:center;}
  .gate .err{color:#FF7A90; font-size:13px;}
</style>
</head>
<body>

<div id="gate" class="gate">
  <h1 style="font-family:'Unbounded'; font-size:20px;">NITRO<span style="color:var(--green);">DROP</span></h1>
  <div style="color:var(--text-dim); font-size:13.5px;">Clé du dashboard</div>
  <input type="text" id="gate-key" placeholder="Colle ta clé ici" autofocus>
  <button class="btn primary" onclick="unlockDashboard()">Accéder</button>
  <div class="err" id="gate-error"></div>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <h1>NITRO<span>DROP</span> — Historique des demandes</h1>
    <button class="btn" onclick="loadSubmissions()">Rafraîchir</button>
  </div>

  <div class="wrap">
    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <select id="filter-casino" onchange="applyFilters()">
        <option value="">Tous les casinos</option>
      </select>
      <input type="text" id="filter-search" placeholder="Rechercher pseudo / email / IP..." oninput="applyFilters()" style="min-width:220px;">
      <select id="filter-tipped" onchange="applyFilters()">
        <option value="">Tipsé : tous</option>
        <option value="yes">Tipsé : oui</option>
        <option value="no">Tipsé : non</option>
      </select>
      <select id="filter-archived" onchange="applyFilters()">
        <option value="active">Actives</option>
        <option value="archived">Archivées</option>
        <option value="all">Toutes</option>
      </select>
    </div>

    <div id="table-container"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
  const PAGE_SIZE = 20;
  let dashboardKey = '';
  let allSubmissions = [];
  let filtered = [];
  let currentPage = 1;
  let workerBaseUrl = '';

  function unlockDashboard(){
    const key = document.getElementById('gate-key').value.trim();
    const urlInput = prompt('URL de base de ton Worker (ex: https://nitrodrop-relay.tonpseudo.workers.dev) :', localStorage.getItem('nitrodrop_worker_base') || '');
    if (!urlInput){
      document.getElementById('gate-error').textContent = 'URL du Worker requise.';
      return;
    }
    workerBaseUrl = urlInput.trim().replace(/\/$/, '');
    localStorage.setItem('nitrodrop_worker_base', workerBaseUrl);
    dashboardKey = key;
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadSubmissions();
  }

  async function loadSubmissions(){
    document.getElementById('table-container').innerHTML = '<div class="empty">Chargement…</div>';
    try{
      const resp = await fetch(`${workerBaseUrl}/submissions`, {
        headers: { 'X-Dashboard-Key': dashboardKey }
      });
      if (resp.status === 401){
        document.getElementById('app').style.display = 'none';
        document.getElementById('gate').style.display = 'flex';
        document.getElementById('gate-error').textContent = 'Clé incorrecte ou secret DASHBOARD_KEY non configuré sur le Worker.';
        return;
      }
      if (!resp.ok) throw new Error('Erreur ' + resp.status);
      const data = await resp.json();
      allSubmissions = (data.submissions || []).slice().reverse(); // plus récent en premier

      const casinos = [...new Set(allSubmissions.map(s => s.platform))].sort();
      const sel = document.getElementById('filter-casino');
      sel.innerHTML = '<option value="">Tous les casinos</option>' +
        casinos.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');

      applyFilters();
    }catch(err){
      console.error(err);
      document.getElementById('table-container').innerHTML =
        `<div class="empty">Erreur de chargement : ${escapeHtml(err.message)}<br>Vérifie l'URL du Worker et ta clé.</div>`;
    }
  }

  function applyFilters(){
    const casino = document.getElementById('filter-casino').value;
    const search = document.getElementById('filter-search').value.toLowerCase();
    const tippedFilter = document.getElementById('filter-tipped').value;
    const archivedFilter = document.getElementById('filter-archived').value;

    filtered = allSubmissions.filter(s => {
      if (archivedFilter === 'active' && s.archived) return false;
      if (archivedFilter === 'archived' && !s.archived) return false;
      if (casino && s.platform !== casino) return false;
      if (tippedFilter === 'yes' && !s.tipped) return false;
      if (tippedFilter === 'no' && s.tipped) return false;
      if (search){
        const haystack = `${s.pseudo} ${s.email} ${s.ip}`.toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    currentPage = 1;
    renderStats();
    renderTable();
    renderPagination();
  }

  function renderStats(){
    const total = filtered.length;
    const tippedCount = filtered.filter(s => s.tipped).length;
    const statsEl = document.getElementById('stats');
    statsEl.innerHTML = `
      <div class="stat"><div class="n">${total}</div><div class="l">Demandes</div></div>
      <div class="stat"><div class="n">${tippedCount}</div><div class="l">Tipsées</div></div>
      <div class="stat"><div class="n">${total - tippedCount}</div><div class="l">En attente</div></div>
    `;
  }

  function renderTable(){
    const container = document.getElementById('table-container');
    if (filtered.length === 0){
      container.innerHTML = '<div class="empty">Aucune demande trouvée.</div>';
      return;
    }
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageItems = filtered.slice(start, start + PAGE_SIZE);

    const rows = pageItems.map(s => `
      <tr style="${s.archived ? 'opacity:0.45;' : ''}">
        <td class="mono">${escapeHtml(s.date || '')}</td>
        <td><span class="badge">${escapeHtml(s.platform || '')}</span></td>
        <td class="mono">${escapeHtml(s.code || '')}</td>
        <td>${escapeHtml(s.pseudo || '')}</td>
        <td class="mono">${escapeHtml(s.email || '')}</td>
        <td class="mono">${escapeHtml(s.ip || '')} ${s.country ? '(' + escapeHtml(s.country) + ')' : ''}</td>
        <td style="text-align:center;">
          <input type="checkbox" ${s.tipped ? 'checked' : ''} onchange="toggleTipped('${s.id}', this.checked)">
        </td>
        <td style="text-align:center;">
          <button class="btn" style="padding:5px 10px; font-size:11.5px;" onclick="toggleArchived('${s.id}', ${!s.archived})">
            ${s.archived ? 'Désarchiver' : 'Archiver'}
          </button>
        </td>
      </tr>
    `).join('');

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Casino</th><th>Code</th><th>Pseudo</th><th>Email</th><th>IP</th><th>Tipsé</th><th>Archive</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function renderPagination(){
    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    const el = document.getElementById('pagination');
    el.innerHTML = `
      <button class="btn" onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>← Précédent</button>
      <span>Page ${currentPage} / ${totalPages}</span>
      <button class="btn" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>Suivant →</button>
    `;
  }

  function goToPage(page){
    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderTable();
    renderPagination();
  }

  async function toggleTipped(id, tipped){
    try{
      const resp = await fetch(`${workerBaseUrl}/submissions/tip`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Dashboard-Key': dashboardKey },
        body: JSON.stringify({ id, tipped })
      });
      if (!resp.ok) throw new Error('Échec de la sauvegarde');
      const entry = allSubmissions.find(s => s.id === id);
      if (entry) entry.tipped = tipped;
      renderStats();
    }catch(err){
      alert('Erreur : ' + err.message);
    }
  }

  async function toggleArchived(id, archived){
    try{
      const resp = await fetch(`${workerBaseUrl}/submissions/archive`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Dashboard-Key': dashboardKey },
        body: JSON.stringify({ id, archived })
      });
      if (!resp.ok) throw new Error('Échec de la sauvegarde');
      const entry = allSubmissions.find(s => s.id === id);
      if (entry) entry.archived = archived;
      applyFilters(); // ré-applique le filtre courant pour faire disparaître/réapparaître la ligne si besoin
    }catch(err){
      alert('Erreur : ' + err.message);
    }
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
  }
</script>

</body>
</html>
