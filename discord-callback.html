<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion Discord…</title>
<style>
  body{
    background:#07070C; color:#F1F0FA; font-family:system-ui, sans-serif;
    display:flex; align-items:center; justify-content:center; height:100vh; margin:0;
    text-align:center; padding:20px;
  }
</style>
</head>
<body>
<p id="msg">Connexion en cours…</p>
<script src="nitrodrop-config.js?v=20260721a"></script>
<script>
(async function(){
  const msgEl = document.getElementById('msg');
  const DISCORD_STORAGE_KEY = 'nitrodrop_discord_identity';

  let modal = {};
  let workerBase = '';
  try{
    const CONFIG = nitrodropLoadPublishedConfig();
    const lang = localStorage.getItem('nitrodrop_lang') || CONFIG.defaultLang || 'fr';
    const active = (CONFIG.content && (CONFIG.content[lang] || CONFIG.content[CONFIG.defaultLang])) || {};
    modal = active.modal || {};
    document.documentElement.lang = lang;
    const relayUrl = (CONFIG.telegramRelay && CONFIG.telegramRelay.url) || '';
    workerBase = relayUrl.replace(/\/notify\/?$/, '');
  }catch(e){}

  msgEl.textContent = modal.callbackConnectingText || 'Connexion en cours…';

  const hashParams = new URLSearchParams(location.hash.slice(1));
  const accessToken = hashParams.get('access_token');

  if (!accessToken){
    msgEl.textContent = modal.callbackFailedMessage || "Échec de la connexion Discord. Tu peux fermer cette fenêtre et réessayer.";
    return;
  }

  try{
    const resp = await fetch('https://discord.com/api/users/@me', {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    if (!resp.ok) throw new Error('Réponse Discord invalide (' + resp.status + ')');
    const user = await resp.json();

    // Sauvegarde directe ici (localStorage + cookie), qu'il y ait un window.opener ou non.
    // Sur mobile, la connexion se fait en pleine page (pas de popup fiable), donc on ne peut
    // pas compter uniquement sur postMessage vers un window.opener qui n'existe pas.
    try{
      const payload = JSON.stringify({ discordId: user.id, username: user.username });
      try{ localStorage.setItem(DISCORD_STORAGE_KEY, payload); }catch(e){}
      try{ document.cookie = DISCORD_STORAGE_KEY + '=' + encodeURIComponent(payload) + '; max-age=31536000; path=/; SameSite=Lax'; }catch(e){}
    }catch(e){}

    // Ajout automatique au serveur Discord (nécessite le scope "guilds.join" déjà demandé
    // dans l'URL d'autorisation). Volontairement non-bloquant : si ça échoue (bot absent,
    // permissions manquantes...), la connexion au site continue normalement quand même.
    if (workerBase){
      fetch(`${workerBase}/discord/join-guild`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accessToken, discordId: user.id }),
      }).catch(() => {});
    }

    if (window.opener){
      // Flux popup (desktop) : on prévient l'onglet d'origine, puis on ferme celui-ci.
      try{
        window.opener.postMessage({
          type: 'nitrodrop-discord-auth',
          discordId: user.id,
          username: user.username
        }, '*');
      }catch(e){}
      msgEl.textContent = modal.callbackSuccessMessage || "Connecté ! Cette fenêtre va se fermer…";
      setTimeout(() => window.close(), 1200);
    } else {
      // Flux pleine page (mobile, ou popup bloquée/perdue) : identité déjà sauvegardée
      // ci-dessus, on retourne directement sur la page d'où venait la personne.
      msgEl.textContent = modal.callbackSuccessMessage || "Connecté ! Redirection…";
      let returnUrl = '/';
      try{ returnUrl = sessionStorage.getItem('nitrodrop_oauth_return') || '/'; }catch(e){}
      try{ sessionStorage.removeItem('nitrodrop_oauth_return'); }catch(e){}
      setTimeout(() => { location.replace(returnUrl); }, 700);
    }
  }catch(err){
    msgEl.textContent = (modal.callbackErrorPrefix || "Erreur : ") + err.message;
  }
})();
</script>
</body>
</html>
